# fleets/<fleet-name>.yml — Fleet-scoped configuration
# All keys are required. Missing keys silently delete resources for this fleet.
# Paths are relative to this file (../platforms/ from fleets/ directory).

name: CHANGEME

team_settings:
  features:
    enable_host_users: true
    enable_software_inventory: true
  secrets:
    - secret: $FLEET_ENROLL_SECRET

agent_options:
  config:
    options:
      distributed_interval: 10
      logger_tls_period: 10

controls:
  enable_disk_encryption: true
  macos_settings:
    custom_settings:
      # .mobileconfig files
      - path: ../platforms/macos/configuration-profiles/firewall.mobileconfig
      # Declaration profiles (DDM .json)
      - path: ../platforms/macos/declaration-profiles/Software Update settings.json
  windows_settings:
    custom_settings:
      - path: ../platforms/windows/configuration-profiles/Enable firewall.xml
  macos_updates:
    deadline: "2026-12-31"
    minimum_version: "15.4"
    update_new_hosts: true
  windows_updates:
    deadline_days: 5
    grace_period_days: 2

policies:
  - path: ../platforms/macos/policies/disk-encryption-check.yml
  - path: ../platforms/windows/policies/disk-encryption-check.yml

reports:
  - path: ../platforms/all/queries/collect-fleetd-information.yml

software:
  fleet_maintained_apps:
    - slug: slack/darwin
      self_service: true
      categories:
        - Communication
  packages:
    - path: ../platforms/macos/software/mozilla-firefox.yml
      self_service: true
      categories:
        - Browsers
  app_store_apps:
    - app_store_id: "1091189122"   # Always quote

labels:
  - path: ../labels/department-engineering.yml
