# labels/<label-name>.yml — Label definition
# Labels can be: dynamic (SQL query), manual (host list), or host_vitals

# Dynamic label (default)
name: "Department: Engineering"
description: "Hosts belonging to the Engineering department"
query: >-
  SELECT 1 FROM mdm_bridge
  WHERE department = 'Engineering'
  OR group_name LIKE '%Engineering%';
platform: ""   # empty = all platforms. Options: darwin, windows, ubuntu, centos

